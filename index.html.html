<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WealthWise — Personal Finance Manager</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:#0d1117;font-family:Georgia,serif;color:#ccd0dd;min-height:100vh}
    input,select{outline:none}
    select option{background:#1a1a2e;color:#e2e8f0}
    ::-webkit-scrollbar{width:6px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:rgba(226,185,111,0.3);border-radius:3px}
  </style>
</head>
<body>
<div id="root"></div>
<script>
const {useState,useRef,useEffect} = React;
const CATS = ["Food","Transport","Housing","Health","Shopping","Entertainment","Education","Other"];
const INCATS = ["Salary","Freelance","Business","Investment","Gift","Other"];
const fmt = n => new Intl.NumberFormat("en-IN",{style:"currency",currency:"INR",maximumFractionDigits:0}).format(n);
const nowDate = () => new Date().toISOString().split("T")[0];
const nowTime = () => new Date().toTimeString().slice(0,5);

const DEMO_TX = [
  {id:1,type:"income",category:"Salary",amount:45000,note:"Monthly salary",date:"2026-03-01",time:"09:00",demo:true},
  {id:2,type:"expense",category:"Housing",amount:12000,note:"Rent",date:"2026-03-02",time:"10:30",demo:true},
  {id:3,type:"expense",category:"Food",amount:4500,note:"Groceries",date:"2026-03-05",time:"07:15",demo:true},
  {id:4,type:"expense",category:"Transport",amount:1800,note:"Fuel",date:"2026-03-08",time:"08:45",demo:true},
  {id:5,type:"income",category:"Freelance",amount:8000,note:"Project payment",date:"2026-03-10",time:"14:00",demo:true},
  {id:6,type:"expense",category:"Entertainment",amount:2200,note:"Movies & dining",date:"2026-03-12",time:"19:30",demo:true},
  {id:7,type:"expense",category:"Health",amount:1500,note:"Doctor visit",date:"2026-03-15",time:"11:00",demo:true},
  {id:8,type:"expense",category:"Shopping",amount:3200,note:"Clothes",date:"2026-03-18",time:"16:20",demo:true},
];
const DEMO_GOALS = [
  {id:1,name:"Emergency Fund",target:150000,saved:45000,demo:true},
  {id:2,name:"New Laptop",target:80000,saved:32000,demo:true},
  {id:3,name:"Vacation",target:50000,saved:12000,demo:true},
];
const INIT_BUDGETS = {Food:6000,Transport:3000,Housing:15000,Health:2500,Shopping:4000,Entertainment:3000,Education:2000,Other:2000};

const load = (key,fb) => { try{ const s=localStorage.getItem(key); return s?JSON.parse(s):fb; }catch{ return fb; } };
const save = (key,val) => { try{ localStorage.setItem(key,JSON.stringify(val)); }catch{} };

function App() {
  const [tab, setTab] = useState("dashboard");
  const [isPremium, setIsPremium] = useState(true);
  const [showUpgrade, setShowUpgrade] = useState(false);
  const [transactions, setTransactions] = useState(()=>load("ww_tx",DEMO_TX));
  const [goals, setGoals] = useState(()=>load("ww_goals",DEMO_GOALS));
  const [budgets, setBudgets] = useState(()=>load("ww_budgets",INIT_BUDGETS));
  const [form, setForm] = useState({type:"expense",category:"Food",amount:"",note:"",date:nowDate(),time:nowTime()});
  const [aiMsgs, setAiMsgs] = useState([{role:"assistant",content:"Hello! I am your AI Financial Advisor. I have access to your full financial data. Ask me anything about budgeting, saving, investing, or spending!"}]);
  const [aiInput, setAiInput] = useState("");
  const [aiLoading, setAiLoading] = useState(false);
  const [newGoal, setNewGoal] = useState({name:"",target:"",saved:""});
  const [goalOpen, setGoalOpen] = useState(false);
  const [saveFlash, setSaveFlash] = useState(false);
  const chatRef = useRef(null);

  useEffect(()=>{ save("ww_tx",transactions); },[transactions]);
  useEffect(()=>{ save("ww_goals",goals); },[goals]);
  useEffect(()=>{ save("ww_budgets",budgets); },[budgets]);
  useEffect(()=>{ if(chatRef.current) chatRef.current.scrollTop=chatRef.current.scrollHeight; },[aiMsgs]);

  const flash = () => { setSaveFlash(true); setTimeout(()=>setSaveFlash(false),2000); };

  const totalInc = transactions.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
  const totalExp = transactions.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
  const balance = totalInc-totalExp;
  const savRate = totalInc>0?Math.round((balance/totalInc)*100):0;
  const expByCat = CATS.reduce((a,c)=>{ a[c]=transactions.filter(t=>t.type==="expense"&&t.category===c).reduce((s,t)=>s+t.amount,0); return a; },{});

  const isDemo = transactions.length>0 && transactions.every(t=>t.demo);
  const isDemoGoals = goals.length>0 && goals.every(g=>g.demo);

  const addTx = () => {
    if(!form.amount||isNaN(form.amount)) return;
    const tx = {...form,id:Date.now(),amount:Number(form.amount),demo:false};
    setTransactions(isDemo?[tx]:[tx,...transactions]);
    setForm({type:"expense",category:"Food",amount:"",note:"",date:nowDate(),time:nowTime()});
    flash();
  };

  const addGoal = () => {
    if(!newGoal.name||!newGoal.target) return;
    const g = {...newGoal,id:Date.now(),target:Number(newGoal.target),saved:Number(newGoal.saved)||0,demo:false};
    setGoals(isDemoGoals?[g]:[...goals,g]);
    setNewGoal({name:"",target:"",saved:""});
    setGoalOpen(false);
    flash();
  };

  const sendAI = async () => {
    if(!aiInput.trim()||aiLoading) return;
    const userMsg = {role:"user",content:aiInput};
    const updated = [...aiMsgs,userMsg];
    setAiMsgs(updated); setAiInput(""); setAiLoading(true);
    const summary = "User financial data: Income "+fmt(totalInc)+", Expenses "+fmt(totalExp)+", Balance "+fmt(balance)+", Savings rate "+savRate+"%. Top expenses: "+Object.entries(expByCat).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([k,v])=>k+" "+fmt(v)).join(", ")+".";
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,
          system:"You are a friendly expert personal finance advisor for Indian users. "+summary+" Give practical, actionable advice. Keep responses concise (2-4 sentences). Use the rupee symbol for currency. Be encouraging.",
          messages:updated.map(m=>({role:m.role,content:m.content}))})});
      const data = await res.json();
      setAiMsgs([...updated,{role:"assistant",content:data.content&&data.content[0]?data.content[0].text:"Sorry, try again."}]);
    } catch(err) {
      setAiMsgs([...updated,{role:"assistant",content:"Connection error. Please try again."}]);
    }
    setAiLoading(false);
  };

  const e = React.createElement;
  const inp = {background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:8,padding:"9px 12px",color:"#e2e8f0",fontSize:13,width:"100%"};
  const btnGold = {background:"linear-gradient(135deg,#e2b96f,#c9963a)",border:"none",borderRadius:8,padding:"11px",color:"#1a1a2e",fontWeight:700,fontSize:13,cursor:"pointer",width:"100%"};
  const card = {background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:12,padding:18,marginBottom:16};
  const cardGold = {background:"rgba(226,185,111,0.06)",border:"1px solid rgba(226,185,111,0.2)",borderRadius:12,padding:18,marginBottom:16};
  const secTitle = {fontSize:12,fontWeight:600,color:"#e2b96f",marginBottom:14,letterSpacing:0.8};
  const demoBanner = {background:"rgba(96,165,250,0.08)",border:"1px solid rgba(96,165,250,0.25)",borderRadius:10,padding:"10px 14px",marginBottom:14,fontSize:12,color:"#60a5fa",lineHeight:1.6};
  const TABS = [{id:"dashboard",label:"Dashboard"},{id:"transactions",label:"Transactions"},{id:"budget",label:"Budget"},{id:"goals",label:"Goals"},{id:"advisor",label:"AI Advisor"}];

  return e("div",{style:{fontFamily:"Georgia,serif",maxWidth:720,margin:"0 auto",minHeight:"100vh",paddingBottom:48}},

    e("div",{style:{background:"linear-gradient(135deg,#1a1a2e 0%,#16213e 55%,#0f3460 100%)",padding:"20px 22px 0",position:"sticky",top:0,zIndex:10}},
      e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}},
        e("div",null,
          e("div",{style:{fontSize:24,fontWeight:700,color:"#e2b96f",letterSpacing:1.5}},"WealthWise"),
          e("div",{style:{fontSize:11,color:"#6677aa",marginTop:3}},"Your Personal Finance Manager")
        ),
        e("div",{style:{display:"flex",alignItems:"center",gap:8}},
          saveFlash?e("div",{style:{background:"rgba(34,197,94,0.15)",border:"1px solid rgba(34,197,94,0.3)",color:"#22c55e",borderRadius:20,padding:"4px 12px",fontSize:11,fontWeight:600}},"Saved!"):null,
          isPremium
            ?e("div",{style:{background:"rgba(226,185,111,0.15)",border:"1px solid #e2b96f",color:"#e2b96f",borderRadius:20,padding:"5px 14px",fontSize:11,fontWeight:700,letterSpacing:1}},"PREMIUM")
            :e("button",{onClick:()=>setShowUpgrade(true),style:{background:"linear-gradient(135deg,#e2b96f,#c9963a)",color:"#1a1a2e",border:"none",borderRadius:20,padding:"7px 18px",fontSize:12,fontWeight:700,cursor:"pointer"}},"Upgrade")
        )
      ),
      e("div",{style:{display:"flex"}},
        TABS.map(t=>e("button",{key:t.id,
          onClick:()=>{ if(t.id==="advisor"&&!isPremium) setShowUpgrade(true); else setTab(t.id); },
          style:{flex:1,background:tab===t.id?"rgba(226,185,111,0.1)":"transparent",color:tab===t.id?"#e2b96f":"#6677aa",border:"none",borderBottom:tab===t.id?"2px solid #e2b96f":"2px solid transparent",padding:"11px 2px",fontSize:11,cursor:"pointer",fontWeight:tab===t.id?700:400}},
          t.label))
      )
    ),

    e("div",{style:{padding:"22px"}},

      tab==="dashboard"?e("div",null,
        isDemo?e("div",{style:demoBanner},"Showing demo data - go to Transactions to add your real data and it will auto-clear!"):null,
        e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:18}},
          ...[{label:"Total Income",value:fmt(totalInc),color:"#22c55e"},{label:"Total Expenses",value:fmt(totalExp),color:"#ef4444"},{label:"Net Balance",value:fmt(balance),color:"#e2b96f"},{label:"Savings Rate",value:savRate+"%",color:"#60a5fa"}]
            .map(c=>e("div",{key:c.label,style:{background:c.color+"14",border:"1px solid "+c.color+"35",borderRadius:14,padding:"16px 18px"}},
              e("div",{style:{fontSize:10,color:"#8899aa",marginBottom:7,textTransform:"uppercase",letterSpacing:1.2}},c.label),
              e("div",{style:{fontSize:22,fontWeight:700,color:c.color}},c.value)
            ))
        ),
        e("div",{style:card},
          e("div",{style:secTitle},"SPENDING BREAKDOWN"),
          ...CATS.filter(c=>expByCat[c]>0).sort((a,b)=>expByCat[b]-expByCat[a]).map(cat=>{
            const pct=totalExp>0?(expByCat[cat]/totalExp)*100:0;
            const over=expByCat[cat]>budgets[cat];
            return e("div",{key:cat,style:{marginBottom:13}},
              e("div",{style:{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:5}},
                e("span",{style:{color:"#ccd0dd"}},cat),
                e("span",{style:{color:over?"#ef4444":"#8899aa"}},fmt(expByCat[cat])+(over?" !":""))
              ),
              e("div",{style:{background:"rgba(255,255,255,0.07)",borderRadius:4,height:7}},
                e("div",{style:{width:Math.min(pct,100)+"%",height:7,borderRadius:4,background:over?"#ef4444":"#e2b96f"}})
              )
            );
          })
        ),
        e("div",{style:card},
          e("div",{style:secTitle},"RECENT TRANSACTIONS"),
          ...transactions.slice(0,6).map(t=>e("div",{key:t.id,style:{display:"flex",justifyContent:"space-between",padding:"9px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}},
            e("div",null,
              e("div",{style:{fontSize:13,color:"#ccd0dd"}},t.note||t.category),
              e("div",{style:{fontSize:11,color:"#6677aa",marginTop:2}},t.category+" - "+t.date+(t.time?" at "+t.time:""))
            ),
            e("div",{style:{fontSize:13,fontWeight:600,color:t.type==="income"?"#22c55e":"#ef4444"}},(t.type==="income"?"+":"-")+fmt(t.amount))
          ))
        ),
        e("div",{style:{textAlign:"center",marginTop:4}},
          e("button",{
            onClick:()=>{ if(window.confirm("Reset all data and go back to demo? This cannot be undone.")){ localStorage.clear(); setTransactions(DEMO_TX); setGoals(DEMO_GOALS); setBudgets(INIT_BUDGETS); }},
            style:{background:"none",border:"1px solid rgba(239,68,68,0.2)",borderRadius:8,padding:"7px 18px",color:"rgba(239,68,68,0.5)",fontSize:11,cursor:"pointer"}
          },"Reset App Data")
        )
      ):null,

      tab==="transactions"?e("div",null,
        isDemo?e("div",{style:demoBanner},"This is demo data. Add your first real transaction and the demo data will automatically disappear!"):null,
        e("div",{style:cardGold},
          e("div",{style:secTitle},"ADD TRANSACTION"),
          e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}},
            e("select",{value:form.type,onChange:ev=>setForm({...form,type:ev.target.value,category:ev.target.value==="income"?"Salary":"Food"}),style:inp},
              e("option",{value:"expense"},"Expense"),
              e("option",{value:"income"},"Income")
            ),
            e("select",{value:form.category,onChange:ev=>setForm({...form,category:ev.target.value}),style:inp},
              ...(form.type==="income"?INCATS:CATS).map(c=>e("option",{key:c},c))
            ),
            e("input",{type:"number",placeholder:"Amount (Rs.)",value:form.amount,onChange:ev=>setForm({...form,amount:ev.target.value}),style:inp}),
            e("input",{type:"date",value:form.date,onChange:ev=>setForm({...form,date:ev.target.value}),style:inp}),
            e("input",{type:"time",value:form.time,onChange:ev=>setForm({...form,time:ev.target.value}),style:{...inp,gridColumn:"1 / -1"}})
          ),
          e("input",{placeholder:"Note (optional)",value:form.note,onChange:ev=>setForm({...form,note:ev.target.value}),style:{...inp,marginBottom:12}}),
          e("button",{onClick:addTx,style:btnGold},"+ Add Transaction")
        ),
        e("div",{style:card},
          e("div",{style:secTitle},"ALL TRANSACTIONS"),
          ...transactions.map(t=>e("div",{key:t.id,style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}},
            e("div",{style:{display:"flex",alignItems:"center",gap:12}},
              e("div",{style:{width:34,height:34,borderRadius:"50%",background:t.type==="income"?"rgba(34,197,94,0.15)":"rgba(239,68,68,0.12)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,color:t.type==="income"?"#22c55e":"#ef4444"}},t.type==="income"?"^":"v"),
              e("div",null,
                e("div",{style:{fontSize:13,color:"#ccd0dd"}},t.note||t.category),
                e("div",{style:{fontSize:11,color:"#6677aa"}},t.category+" - "+t.date+(t.time?" at "+t.time:""))
              )
            ),
            e("div",{style:{display:"flex",alignItems:"center",gap:10}},
              e("span",{style:{fontSize:13,fontWeight:600,color:t.type==="income"?"#22c55e":"#ef4444"}},(t.type==="income"?"+":"-")+fmt(t.amount)),
              e("button",{onClick:()=>setTransactions(transactions.filter(x=>x.id!==t.id)),style:{background:"none",border:"none",color:"#445566",cursor:"pointer",fontSize:20,lineHeight:1}},"x")
            )
          ))
        )
      ):null,

      tab==="budget"?e("div",{style:card},
        e("div",{style:secTitle},"MONTHLY BUDGET TRACKER"),
        e("div",{style:{fontSize:11,color:"#6677aa",marginBottom:18,marginTop:-10}},"Edit numbers on the right to set your monthly limit"),
        ...CATS.map(cat=>{
          const spent=expByCat[cat]||0, budget=budgets[cat]||0;
          const pct=budget>0?Math.min((spent/budget)*100,100):0;
          const over=spent>budget;
          return e("div",{key:cat,style:{marginBottom:18}},
            e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}},
              e("span",{style:{fontSize:13,fontWeight:600,color:"#ccd0dd"}},cat),
              e("div",{style:{display:"flex",alignItems:"center",gap:6,fontSize:12}},
                e("span",{style:{color:over?"#ef4444":"#8899aa"}},fmt(spent)+" / "),
                e("input",{type:"number",value:budget,onChange:ev=>setBudgets({...budgets,[cat]:Number(ev.target.value)}),
                  style:{width:90,background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:6,padding:"4px 8px",color:"#e2b96f",fontSize:12,textAlign:"right"}})
              )
            ),
            e("div",{style:{background:"rgba(255,255,255,0.07)",borderRadius:6,height:8}},
              e("div",{style:{width:pct+"%",height:8,borderRadius:6,background:over?"#ef4444":pct>80?"#f59e0b":"#22c55e"}})
            ),
            over?e("div",{style:{fontSize:11,color:"#ef4444",marginTop:4}},"Over budget by "+fmt(spent-budget)):null
          );
        })
      ):null,

      tab==="goals"?e("div",null,
        isDemoGoals?e("div",{style:demoBanner},"These are demo goals. Click '+ Add Goal' to add your first real goal and all demo goals will automatically disappear!"):null,
        e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}},
          e("div",{style:{fontSize:13,fontWeight:600,color:"#e2b96f"}},"SAVINGS GOALS"),
          e("button",{onClick:()=>setGoalOpen(!goalOpen),style:{background:"rgba(226,185,111,0.15)",border:"1px solid rgba(226,185,111,0.3)",borderRadius:8,padding:"7px 16px",color:"#e2b96f",fontSize:12,cursor:"pointer",fontWeight:600}},"+ Add Goal")
        ),
        goalOpen?e("div",{style:cardGold},
          e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:10}},
            e("input",{placeholder:"Goal name",value:newGoal.name,onChange:ev=>setNewGoal({...newGoal,name:ev.target.value}),style:inp}),
            e("input",{type:"number",placeholder:"Target amount",value:newGoal.target,onChange:ev=>setNewGoal({...newGoal,target:ev.target.value}),style:inp}),
            e("input",{type:"number",placeholder:"Saved so far",value:newGoal.saved,onChange:ev=>setNewGoal({...newGoal,saved:ev.target.value}),style:inp})
          ),
          e("button",{onClick:addGoal,style:btnGold},"Create Goal")
        ):null,
        ...goals.map(g=>{
          const pct=Math.min((g.saved/g.target)*100,100);
          return e("div",{key:g.id,style:card},
            e("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:12}},
              e("div",null,
                e("div",{style:{fontSize:15,fontWeight:600,color:"#ccd0dd"}},g.name),
                e("div",{style:{fontSize:12,color:"#6677aa",marginTop:3}},"Target: "+fmt(g.target))
              ),
              e("div",{style:{textAlign:"right"}},
                e("div",{style:{fontSize:22,fontWeight:700,color:"#e2b96f"}},Math.round(pct)+"%"),
                e("div",{style:{fontSize:11,color:"#6677aa"}},"complete")
              )
            ),
            e("div",{style:{background:"rgba(255,255,255,0.07)",borderRadius:8,height:10,marginBottom:10}},
              e("div",{style:{width:pct+"%",height:10,borderRadius:8,background:pct>=100?"#22c55e":"#e2b96f"}})
            ),
            e("div",{style:{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:12}},
              e("span",{style:{color:"#22c55e"}},"Saved: "+fmt(g.saved)),
              g.target-g.saved>0
                ?e("span",{style:{color:"#8899aa"}},"Still need: "+fmt(g.target-g.saved))
                :e("span",{style:{color:"#22c55e",fontWeight:700}},"Goal Achieved!")
            ),
            e("div",{style:{display:"flex",gap:8}},
              e("input",{type:"number",placeholder:"Add savings - press Enter",
                onKeyDown:function(ev){
                  if(ev.key==="Enter"&&ev.target.value){
                    if(isDemoGoals){ setGoals([]); }
                    else { setGoals(goals.map(function(x){ return x.id===g.id?{...x,saved:Math.min(x.saved+Number(ev.target.value),x.target)}:x; })); flash(); }
                    ev.target.value="";
                  }
                },
                style:{...inp,flex:1,fontSize:12}}),
              e("button",{
                onClick:function(){ setGoals(isDemoGoals?[]:goals.filter(function(x){ return x.id!==g.id; })); },
                style:{background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.25)",borderRadius:8,padding:"9px 14px",color:"#ef4444",fontSize:12,cursor:"pointer"}
              },"Delete")
            )
          );
        })
      ):null,

      tab==="advisor"&&isPremium?e("div",null,
        e("div",{style:{background:"rgba(226,185,111,0.07)",border:"1px solid rgba(226,185,111,0.2)",borderRadius:10,padding:"11px 16px",marginBottom:16,fontSize:12,color:"#8899aa",lineHeight:1.6}},
          "Your AI Advisor has real-time access to your spending, income, and goals. Ask anything!"
        ),
        e("div",{ref:chatRef,style:{height:360,overflowY:"auto",marginBottom:14,display:"flex",flexDirection:"column",gap:10,paddingRight:4}},
          ...aiMsgs.map(function(m,i){
            return e("div",{key:i,style:{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}},
              e("div",{style:{maxWidth:"80%",padding:"10px 15px",
                borderRadius:m.role==="user"?"16px 16px 4px 16px":"16px 16px 16px 4px",
                background:m.role==="user"?"linear-gradient(135deg,#e2b96f,#c9963a)":"rgba(255,255,255,0.06)",
                border:m.role==="assistant"?"1px solid rgba(255,255,255,0.1)":"none",
                color:m.role==="user"?"#1a1a2e":"#ccd0dd",fontSize:13,lineHeight:1.65}},m.content)
            );
          }),
          aiLoading?e("div",{style:{display:"flex"}},
            e("div",{style:{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"16px 16px 16px 4px",padding:"10px 16px",color:"#8899aa",fontSize:13}},"Thinking...")
          ):null
        ),
        e("div",{style:{display:"flex",gap:8,marginBottom:10}},
          e("input",{value:aiInput,onChange:function(ev){setAiInput(ev.target.value);},
            onKeyDown:function(ev){if(ev.key==="Enter")sendAI();},
            placeholder:"Ask about your finances...",style:{...inp,flex:1,borderRadius:10,padding:"11px 15px"}}),
          e("button",{onClick:sendAI,disabled:aiLoading,
            style:{background:"linear-gradient(135deg,#e2b96f,#c9963a)",border:"none",borderRadius:10,padding:"11px 20px",color:"#1a1a2e",fontWeight:700,fontSize:13,cursor:"pointer",opacity:aiLoading?0.6:1}},"Send")
        ),
        e("div",{style:{display:"flex",gap:6,flexWrap:"wrap"}},
          ...["How can I save more?","Am I overspending?","Investment tips for me","How to build emergency fund?","Tax saving tips"]
            .map(function(q){ return e("button",{key:q,onClick:function(){setAiInput(q);},
              style:{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:16,padding:"6px 12px",color:"#8899aa",fontSize:11,cursor:"pointer"}},q); })
        )
      ):null

    ),

    showUpgrade?e("div",{onClick:function(){setShowUpgrade(false);},style:{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999}},
      e("div",{onClick:function(ev){ev.stopPropagation();},style:{background:"#1a1a2e",border:"1px solid rgba(226,185,111,0.35)",borderRadius:20,padding:"2rem",width:360,maxWidth:"92vw"}},
        e("div",{style:{textAlign:"center",marginBottom:"1.5rem"}},
          e("div",{style:{fontSize:36,marginBottom:10}},"*"),
          e("div",{style:{fontSize:21,fontWeight:700,color:"#e2b96f"}},"Upgrade to Premium"),
          e("div",{style:{fontSize:13,color:"#8899aa",marginTop:6}},"Unlock AI-powered financial advice")
        ),
        ...["AI Financial Advisor - personalized advice","Unlimited transaction history","Advanced spending insights","Investment recommendations","Tax saving tips"]
          .map(function(f){ return e("div",{key:f,style:{display:"flex",alignItems:"center",gap:10,marginBottom:11,fontSize:13,color:"#ccd0dd"}},
            e("span",{style:{color:"#22c55e",fontSize:16,flexShrink:0}},"OK"),f
          ); }),
        e("div",{style:{textAlign:"center",margin:"1.5rem 0 1rem"}},
          e("div",{style:{fontSize:30,fontWeight:700,color:"#e2b96f"}},"Rs.299",e("span",{style:{fontSize:14,color:"#8899aa",fontWeight:400}},"/month"))
        ),
        e("button",{onClick:function(){setIsPremium(true);setShowUpgrade(false);setTab("advisor");},
          style:{...btnGold,borderRadius:10,padding:"13px",fontSize:14,marginBottom:12}},"Start Premium - Rs.299/month"),
        e("button",{onClick:function(){setShowUpgrade(false);},
          style:{width:"100%",background:"none",border:"none",color:"#6677aa",fontSize:12,cursor:"pointer",padding:6}},"Maybe later")
      )
    ):null
  );
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>
</body>
</html>
